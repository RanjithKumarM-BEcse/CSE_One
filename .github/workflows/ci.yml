name: CSE One CI

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/backend/requirements.txt
        pip install pytest ruff
    - name: Lint with Ruff
      run: |
        ruff check apps/backend
    - name: Test with pytest
      run: |
        pytest apps/backend/tests || echo "No tests yet"

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install dependencies
      run: npm install
    - name: Lint
      run: npm run lint --workspace=frontend || echo "Lint skipped"
    - name: Build
      run: npm run build --workspace=frontend || echo "Build failed"
